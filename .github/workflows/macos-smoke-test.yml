name: macOS Smoke Test

on:
  schedule:
    - cron: '0 4 * * 0'   # Sunday 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'bootstrap.sh'
      - 'install'
      - 'Brewfile'

jobs:
  smoke-test:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Verify install script syntax
        run: |
          bash -n install
          bash -n bootstrap.sh
          bash -n scripts/verify.sh
          bash -n scripts/update.sh
          bash -n scripts/macos-defaults.sh
          bash -n scripts/nuke.sh

      - name: Verify Brewfile syntax
        run: |
          brew bundle check --file=./Brewfile --verbose || true
          # Don't actually install — just validate format

      - name: Verify chezmoi templates
        run: |
          brew install chezmoi
          chezmoi --source . execute-template < .chezmoi.toml.tmpl || true

      - name: Run dry-run bootstrap
        run: |
          # Set DOTFILES_DIR to current checkout
          export DOTFILES_DIR="${{ github.workspace }}"
          bash bootstrap.sh --dry-run
